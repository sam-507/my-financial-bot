name: Run Daily Financial Bot

on:
  schedule:
    # This runs every single day at 06:00 UTC (11:30 AM IST / 2:00 AM EST)
    - cron: '0 6 * * *'
  workflow_dispatch: # This allows you to also run it manually anytime with a click!

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas openai

      - name: Execute Screener Engine
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python financial_bot.py
